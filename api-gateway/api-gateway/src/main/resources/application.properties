spring.application.name=api-gateway

server.port=8081

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=frameblog
spring.cloud.gateway.server.webflux.routes[0].uri=lb://FRAMEBLOG
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/frameblog/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[0].filters[1].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.name=frameblogCircuitBreaker
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.fallbackUri=forward:/fallback/frameblog
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.statusCodes=500,502,503,504